apiVersion: v1
kind: Namespace
metadata:
  name: habit-tracker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-db
  namespace: habit-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habit-db
  template:
    metadata:
      labels:
        app: habit-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: habit_tracker
            - name: POSTGRES_USER
              value: habit_user
            - name: POSTGRES_PASSWORD
              value: habit_password
---
apiVersion: v1
kind: Service
metadata:
  name: habit-db
  namespace: habit-tracker
spec:
  selector:
    app: habit-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: habit-backend
  namespace: habit-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: habit-backend
  template:
    metadata:
      labels:
        app: habit-backend
    spec:
      containers:
        - name: habit-backend
          image: habit-tracker-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              value: jdbc:postgresql://habit-db:5432/habit_tracker
            - name: DB_USERNAME
              value: habit_user
            - name: DB_PASSWORD
              value: habit_password
---
apiVersion: v1
kind: Service
metadata:
  name: habit-backend
  namespace: habit-tracker
spec:
  selector:
    app: habit-backend
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  type: NodePort
